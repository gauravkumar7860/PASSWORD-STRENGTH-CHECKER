<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Password Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-shield-alt"></i> Advanced Password Checker</h1>
            <p>Comprehensive password strength analysis with AI-powered suggestions</p>
        </header>

        <div class="password-input-section">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter your password..." maxlength="50">
                <button id="showHideBtn" class="show-hide-btn">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>
        </div>

        <div class="strength-display" id="strengthDisplay">
            <div class="strength-circle">
                <div class="circle" id="strengthCircle">
                    <span id="strengthScore">0</span>%
                </div>
            </div>
            <div class="strength-info">
                <h3 id="strengthText">Enter a password</h3>
                <div class="entropy-info">
                    <span>Entropy: <span id="entropyValue">0</span> bits</span>
                </div>
            </div>
        </div>

        <div class="checklist-section" id="checklistSection">
            <h3><i class="fas fa-check-circle"></i> Security Checklist</h3>
            <div class="checklist" id="checklist"></div>
        </div>

        <div class="suggestions-section" id="suggestionsSection">
            <h3><i class="fas fa-lightbulb"></i> Improvement Suggestions</h3>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="generate-section">
            <h3><i class="fas fa-magic"></i> Generate Strong Password</h3>
            <button id="generateBtn" class="generate-btn">
                <i class="fas fa-sync-alt"></i> Generate Secure Password
            </button>
            <div id="generatedPassword" class="generated-password"></div>
            <div class="copy-btn-container">
                <button id="copyBtn" class="copy-btn" style="display: none;">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
